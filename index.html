<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Viewer 3.1.4</title>
    <script src="https://cdn.jsdelivr.net/npm/universalviewer@3.1.4/dist/uv.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/universalviewer@3.1.4/dist/uv.css" />
    <style>
      body { margin: 0; padding: 10px; font-family: sans-serif; }
      #uv { width: 100%; height: 80vh; }
      #options { margin-top: 10px; display: flex; gap: 8px; }
      #manifest { flex: 1; padding: 4px; }
    </style>
  </head>
  <body>
    <div id="uv"></div>
    <div id="options">
      <input id="manifest" type="text" placeholder="Paste a manifest URL and click Set" />
      <button id="setManifestButton">Set</button>
    </div>

    <script>
      var DEFAULT_MANIFEST = "https://raw.githubusercontent.com/kirschbombe/perseguido/main/output/full-run.json";
      var CDN_ROOT = "https://cdn.jsdelivr.net/npm/universalviewer@3.1.4/dist/";

      function initUV(manifest) {
        uv = createUV("#uv", {
          iiifResourceUri: manifest,
          configUri: "uv-config.json",
          root: CDN_ROOT,
          embedded: true
        }, new UV.URLDataProvider());
      }

      // UV 3.x from CDN may fire uvLoaded or be ready immediately after DOMContentLoaded
      document.addEventListener("DOMContentLoaded", function() {
        if (typeof createUV !== "undefined") {
          initUV(DEFAULT_MANIFEST);
        } else {
          window.addEventListener("uvLoaded", function() { initUV(DEFAULT_MANIFEST); });
        }

        document.getElementById("setManifestButton").addEventListener("click", function() {
          var value = document.getElementById("manifest").value.trim();
          if (value) uv.set({ iiifResourceUri: value });
        });
      });
    </script>
  </body>
</html>
